<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>J-OSAKA Kintone横断検索</title>
<style>
  :root {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color-scheme: light;
  }

  body {
    margin: 0;
    padding: 0;
    background: #f3f4f6;
  }

  .wrapper {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .main-container {
    max-width: 1200px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
    align-items: start;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
    width: 100%;
    padding: 24px 28px 28px;
    box-sizing: border-box;
  }

  .sidebar {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
    padding: 20px;
    box-sizing: border-box;
    position: sticky;
    top: 40px;
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .sidebar-links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sidebar-link {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .sidebar-link::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }

  .sidebar-link:hover::before {
    left: 100%;
  }

  .sidebar-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
  }

  .sidebar-link:active {
    transform: translateY(0);
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 18px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .card-sub {
    font-size: 12px;
    color: #6b7280;
  }

  .field-label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
